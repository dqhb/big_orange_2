<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>big orange 2</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #0f172a; font-family: 'Segoe UI', sans-serif; color: white; user-select: none; text-transform: lowercase; }
        canvas { display: block; }
        #ui { position: absolute; top: 20px; left: 20px; font-size: 2rem; color: #f97316; font-weight: bold; text-shadow: 0 0 10px #f97316; z-index: 5; }
        #dash-ui { position: absolute; top: 60px; left: 20px; font-size: 1.2rem; color: #38bdf8; font-weight: bold; }
        #menu, #game-over { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10; }
        h1 { font-size: 4rem; color: #f97316; margin: 0 0 10px 0; text-shadow: 0 0 20px #f97316; text-align: center; }
        p { color: #cbd5e1; font-size: 1.2rem; margin-bottom: 30px; text-align: center; max-width: 600px; line-height: 1.5; }
        #final-score-text { font-size: 1.5rem; font-weight: bold; color: #fdba74; margin-bottom: 20px; }
        button { background: #f97316; color: #0f172a; border: none; padding: 15px 40px; font-size: 1.5rem; font-weight: bold; border-radius: 8px; cursor: pointer; box-shadow: 0 0 15px #f97316; transition: transform 0.1s; text-transform: lowercase; }
        button:hover { transform: scale(1.05); }
        #game-over { display: none; }
    </style>
</head>
<body>

    <div id="ui">score: <span id="score-val">0</span></div>
    <div id="dash-ui">dash ready</div>

    <div id="menu">
        <h1>big orange 2</h1>
        <p>run. don't fall. dodge the saws and lasers.<br>
        the orange is watching<br><br>
        <b>A / D / Left / Right</b> to move<br>
        <b>W / Up Arrow</b> to double jump<br>
        <b>Space / Down Arrow</b> to dash</p>
        <button onclick="startGame()">engage</button>
    </div>

    <div id="game-over">
        <h1 style="color: #ea580c; text-shadow: 0 0 20px #ea580c;">juiced</h1>
        <p id="final-score-text">score: 0 <br> high score: 0</p>
        <button onclick="location.reload()">retry</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score-val');
        const dashEl = document.getElementById('dash-ui');

        let isPlaying = false, score = 0, frame = 0, camX = 0, shakeTime = 0;
        const keys = { a: false, d: false, shift: false };
        let wPressed = false, shiftPressed = false; 

        const p = { x: 100, y: 300, vx: 0, vy: 0, r: 15, grav: 0.6, jump: -11, jumps: 2, grounded: false, platVx: 0, platVy: 0, dashCooldown: 0 };
        
        const boss = { x: 0, y: 180, r: 150, color: '#c2410c', state: 'idle', timer: 180, targetX: 0, targetY: 0 }; 
        
        let platforms = [], hazards = [], particles = [], lasers = [];
        let genX = 0, lastY = 400;

        function resize() { 
            canvas.width = window.innerWidth; 
            canvas.height = window.innerHeight; 
            boss.x = canvas.width / 2; 
        }
        window.addEventListener('resize', resize);
        resize(); 

        window.addEventListener('keydown', e => {
            let k = e.key.toLowerCase();
            let code = e.code;
            if (k === 'a' || k === 'arrowleft') keys.a = true;
            if (k === 'd' || k === 'arrowright') keys.d = true;
            
            if ((code === 'Space' || k === 'arrowdown' || k === 'shift' || k === 's') && !shiftPressed) { 
                keys.shift = true; shiftPressed = true; 
            }
            
            if ((k === 'w' || k === 'arrowup') && !wPressed) { 
                wPressed = true; 
                if (p.jumps > 0) {
                    p.vy = p.jump; p.jumps--; p.grounded = false;
                    for(let i=0; i<5; i++) spawnParticle(p.x, p.y+p.r, '#f97316', 20, 4);
                }
            }
        });
        
        window.addEventListener('keyup', e => {
            let k = e.key.toLowerCase();
            let code = e.code;
            if (k === 'a' || k === 'arrowleft') keys.a = false;
            if (k === 'd' || k === 'arrowright') keys.d = false;
            if (k === 'w' || k === 'arrowup') wPressed = false; 
            if (code === 'Space' || k === 'arrowdown' || k === 'shift' || k === 's') { keys.shift = false; shiftPressed = false; }
        });

        window.startGame = function() {
            document.getElementById('menu').style.display = 'none';
            platforms = []; hazards = []; particles = []; lasers = [];
            score = 0; frame = 0; camX = 0; shakeTime = 0;
            boss.state = 'idle'; boss.timer = 180;
            scoreEl.innerText = score;
            p.dashCooldown = 0;
            p.x = 200; p.y = canvas.height / 2 - 50; p.vx = 0; p.vy = 0;

            platforms.push({ x: 50, y: canvas.height / 2 + 50, w: 400, h: 20, type: 'static', touched: true, t: 0, crumbleTimer: 60, isFalling: false, fallVy: 0 });
            genX = 450; lastY = canvas.height / 2 + 50;

            generateLevel(2000); 
            isPlaying = true;
            gameLoop();
        };

        function die() {
            isPlaying = false;
            let hs = localStorage.getItem('orange_highscore') || 0;
            if (score > hs) { hs = score; localStorage.setItem('orange_highscore', hs); }
            document.getElementById('final-score-text').innerHTML = `score: ${score} <br> high score: ${hs}`;
            document.getElementById('game-over').style.display = 'flex';
        }

        function spawnParticle(x, y, color, life, speed) {
            particles.push({ x, y, vx: (Math.random()-0.5)*speed, vy: (Math.random()-0.5)*speed, r: Math.random()*3+2, color, life, maxLife: life });
        }

        function distToSegment(px, py, x1, y1, x2, y2) {
            let A = px - x1, B = py - y1, C = x2 - x1, D = y2 - y1;
            let dot = A * C + B * D;
            let len_sq = C * C + D * D;
            let param = -1;
            if (len_sq != 0) param = dot / len_sq;
            let xx, yy;
            if (param < 0) { xx = x1; yy = y1; }
            else if (param > 1) { xx = x2; yy = y2; }
            else { xx = x1 + param * C; yy = y1 + param * D; }
            let dx = px - xx, dy = py - yy;
            return Math.sqrt(dx * dx + dy * dy);
        }

        function generateLevel(targetX) {
            while (genX < targetX) {
                let maxGap = Math.min(80 + score * 4, 320); 
                let gapX = Math.random() * maxGap + 50;
                let gapY = (Math.random() - 0.5) * 160;
                
                let y = lastY + gapY;
                if (y > canvas.height - 100) y = canvas.height - 100;
                if (y < 250) y = 250; 
                
                let w = Math.random() * 100 + 100;
                let plat = { x: genX + gapX, y: y, w: w, h: 20, type: 'static', touched: false, t: Math.random()*100, crumbleTimer: 60, isFalling: false, fallVy: 0 };
                
                let rand = Math.random();
                if (score > 2 && rand < 0.2) { plat.type = 'moveY'; plat.range = 80; plat.speed = 0.04; } 
                else if (score > 5 && rand < 0.4) { plat.type = 'moveX'; plat.range = 100; plat.speed = 0.03; }
                else if (score > 3 && rand < 0.7) { plat.type = 'crumbling'; }

                platforms.push(plat); genX = plat.x + plat.w; lastY = plat.y;

                if (Math.random() < 0.6 && plat.w > 60) {
                    let spikeMove = score > 4 && Math.random() < 0.7;
                    hazards.push({ type: 'spike', p: plat, xOff: plat.w/2, move: spikeMove, dir: 1, speed: 3 });
                }

                if (score > 4 && Math.random() < 0.6) {
                    hazards.push({ type: 'saw', x: plat.x - gapX/2, y: y - Math.random()*100 - 50, r: 45, moveDir: Math.random() < 0.5 ? 'x' : 'y', t: Math.random()*100, speed: 0.05 });
                }
            }
        }

        function update() {
            frame++;
            if (genX < camX + canvas.width + 1000) generateLevel(camX + canvas.width + 1000);

            // Boss AI Logic
            if (score > 5) {
                boss.timer--;
                if (boss.state === 'idle' && boss.timer <= 0) {
                    boss.state = Math.random() < 0.5 ? 'roar' : 'eye_laser_warn';
                    boss.timer = 60; // 1 second warning
                    
                    if (boss.state === 'eye_laser_warn') {
                        // Lock onto player's exact current location instantly
                        boss.targetX = p.x;
                        boss.targetY = p.y;
                    }
                }

                if (boss.state === 'eye_laser_warn') {
                    if (boss.timer <= 0) { boss.state = 'eye_laser_fire'; boss.timer = 20; shakeTime = 20; }
                }

                if (boss.state === 'eye_laser_fire') {
                    let ex1 = boss.x + camX - boss.r*0.3, ey1 = boss.y - boss.r*0.2;
                    let ex2 = boss.x + camX + boss.r*0.3, ey2 = boss.y - boss.r*0.2;
                    
                    if (distToSegment(p.x, p.y, ex1, ey1, boss.targetX, boss.targetY) < 20 ||
                        distToSegment(p.x, p.y, ex2, ey2, boss.targetX, boss.targetY) < 20) {
                        die();
                    }

                    if (boss.timer <= 0) { boss.state = 'idle'; boss.timer = 180; } 
                }

                if (boss.state === 'roar') {
                    if (boss.timer === 59) {
                        shakeTime = 40; 
                        platforms.forEach(plat => {
                            if (plat.x > camX - 100 && plat.x < camX + canvas.width + 100 && plat.type === 'static') {
                                plat.type = 'crumbling';
                                for(let i=0; i<5; i++) spawnParticle(plat.x + Math.random()*plat.w, plat.y, '#facc15', 30, 3);
                            }
                        });
                    }
                    if (boss.timer <= 0) { boss.state = 'idle'; boss.timer = 180; }
                }
            }

            // Sky Lasers
            if (frame % 80 === 0) {
                let numLasers = Math.random() < 0.5 ? 2 : 3;
                let screenSection = canvas.width / numLasers;
                for(let j = 0; j < numLasers; j++) {
                    let lx = camX + (j * screenSection) + (Math.random() * screenSection * 0.8);
                    lasers.push({ x: lx, timer: 60, state: 'warn' });
                }
            }

            for (let i = lasers.length - 1; i >= 0; i--) {
                let l = lasers[i]; l.timer--;
                if (l.state === 'warn' && l.timer <= 0) { 
                    l.state = 'fire'; l.timer = 15; shakeTime = 10; 
                } 
                else if (l.state === 'fire') {
                    if (p.x + p.r > l.x - 40 && p.x - p.r < l.x + 40) { shakeTime = 20; die(); }
                    if (l.timer <= 0) lasers.splice(i, 1);
                }
            }

            if (keys.a) p.vx -= 0.8;
            if (keys.d) p.vx += 0.8;
            p.vx *= 0.85; 

            if (p.dashCooldown > 0) p.dashCooldown--;
            dashEl.innerText = p.dashCooldown <= 0 ? "dash ready (space / down)" : "dash cooling...";
            dashEl.style.color = p.dashCooldown <= 0 ? "#38bdf8" : "#64748b";

            if (keys.shift && p.dashCooldown <= 0) {
                p.vx = keys.a ? -20 : 20; p.vy = -3; p.dashCooldown = 90; keys.shift = false;
                for(let i=0; i<10; i++) spawnParticle(p.x, p.y, '#38bdf8', 30, 6); 
            }
            
            p.vy += p.grav; p.x += p.vx + (p.grounded ? p.platVx : 0); p.y += p.vy + (p.grounded ? p.platVy : 0);

            let targetCamX = p.x - canvas.width / 3;
            if (targetCamX > camX) camX += (targetCamX - camX) * 0.1;
            
            if (p.y > canvas.height + 100 || p.x < camX - 50) die();

            p.grounded = false; p.platVx = 0; p.platVy = 0;

            for (let i = platforms.length - 1; i >= 0; i--) {
                let plat = platforms[i]; let oldX = plat.x, oldY = plat.y;
                plat.t += plat.speed || 0;
                
                if (plat.type === 'moveY') plat.y += Math.sin(plat.t) * 2;
                if (plat.type === 'moveX') plat.x += Math.cos(plat.t) * 2;

                if (plat.type === 'crumbling' && plat.touched) {
                    if (!plat.isFalling) {
                        plat.crumbleTimer--;
                        if (plat.crumbleTimer <= 0) plat.isFalling = true;
                    } else {
                        plat.fallVy += 0.5;
                        plat.y += plat.fallVy;
                        hazards = hazards.filter(h => h.p !== plat);
                    }
                }

                if ((plat.type === 'moveX' || plat.type === 'moveY') && Math.random() < 0.2) {
                    spawnParticle(plat.x + Math.random()*plat.w, plat.y + 10, '#ea580c', 30, 1);
                }

                if (p.vy >= 0 && !plat.isFalling && p.x + p.r > plat.x && p.x - p.r < plat.x + plat.w && p.y + p.r >= plat.y && p.y - p.r < plat.y + 10) {
                    p.y = plat.y - p.r; p.vy = 0; p.jumps = 2; p.grounded = true;
                    p.platVx = plat.x - oldX; p.platVy = plat.y - oldY;
                    if (!plat.touched) { plat.touched = true; score++; scoreEl.innerText = score; }
                }
                
                if (plat.x + plat.w < camX - 200 || plat.y > canvas.height + 200) platforms.splice(i, 1);
            }

            for (let i = hazards.length - 1; i >= 0; i--) {
                let h = hazards[i];
                if (h.type === 'spike') {
                    if (h.move) {
                        h.xOff += h.dir * h.speed;
                        if (h.xOff < 10 || h.xOff > h.p.w - 10) h.dir *= -1;
                        if (Math.random() < 0.2) spawnParticle(h.p.x + h.xOff, h.p.y, '#ef4444', 20, 2);
                    }
                    if (Math.hypot(p.x - (h.p.x + h.xOff), p.y - h.p.y + 10) < p.r + 10) { shakeTime = 20; die(); }
                    if (h.p.x + h.p.w < camX - 200) hazards.splice(i, 1);
                } 
                else if (h.type === 'saw') {
                    h.t += h.speed;
                    if (h.moveDir === 'y') h.y += Math.sin(h.t) * 3;
                    if (h.moveDir === 'x') h.x += Math.cos(h.t) * 3;
                    if (Math.random() < 0.3) spawnParticle(h.x, h.y, '#ea580c', 20, 1);
                    if (Math.hypot(p.x - h.x, p.y - h.y) < p.r + h.r - 5) { shakeTime = 20; die(); }
                    if (h.x < camX - 200) hazards.splice(i, 1);
                }
            }

            for (let i = particles.length - 1; i >= 0; i--) {
                let pt = particles[i]; pt.x += pt.vx; pt.y += pt.vy; pt.life--;
                if (pt.life <= 0) particles.splice(i, 1);
            }
        }

        function drawParallax(color, speed, amplitude, frequency, yOffset) {
            ctx.fillStyle = color; ctx.beginPath(); ctx.moveTo(0, canvas.height);
            for (let x = 0; x <= canvas.width + 20; x += 20) {
                let worldX = camX * speed + x;
                let y = canvas.height - yOffset + Math.sin(worldX * frequency) * amplitude;
                y += Math.cos(worldX * frequency * 2.5) * (amplitude * 0.3); 
                ctx.lineTo(x, y);
            }
            ctx.lineTo(canvas.width, canvas.height); ctx.fill();
        }

        function drawFace(x, y, r, color, isRoaring) {
            ctx.fillStyle = color; ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = 'black';
            ctx.beginPath(); ctx.arc(x - r*0.3, y - r*0.2, r*0.1, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(x + r*0.3, y - r*0.2, r*0.1, 0, Math.PI*2); ctx.fill();
            ctx.strokeStyle = 'black'; ctx.lineWidth = r*0.1; ctx.beginPath();
            
            if (isRoaring) {
                ctx.arc(x, y + r*0.3, r*0.4, 0, Math.PI * 2); 
                ctx.fillStyle = 'black'; ctx.fill();
            } else {
                ctx.arc(x, y + r*0.1, r*0.5, 0, Math.PI); 
                ctx.stroke();
            }
        }

        function draw() {
            ctx.fillStyle = '#0f172a'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.save();
            
            if (shakeTime > 0) {
                let dx = (Math.random() - 0.5) * (shakeTime > 20 ? 30 : 15);
                let dy = (Math.random() - 0.5) * (shakeTime > 20 ? 30 : 15);
                ctx.translate(dx, dy);
                shakeTime--;
            }

            drawFace(boss.x, boss.y, boss.r, boss.color, boss.state === 'roar');

            ctx.save();
            ctx.translate(-camX, 0); 
            if (boss.state === 'eye_laser_warn' || boss.state === 'eye_laser_fire') {
                let ex1 = boss.x + camX - boss.r*0.3, ey1 = boss.y - boss.r*0.2;
                let ex2 = boss.x + camX + boss.r*0.3, ey2 = boss.y - boss.r*0.2;
                
                ctx.beginPath();
                ctx.moveTo(ex1, ey1); ctx.lineTo(boss.targetX, boss.targetY);
                ctx.moveTo(ex2, ey2); ctx.lineTo(boss.targetX, boss.targetY);
                
                if (boss.state === 'eye_laser_warn') {
                    ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)'; ctx.lineWidth = 2;
                } else {
                    ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 20;
                    ctx.shadowColor = '#ea580c'; ctx.shadowBlur = 30; 
                }
                ctx.stroke();
                ctx.shadowBlur = 0; 
            }
            ctx.restore();

            drawParallax('#431407', 0.15, 120, 0.002, 100); 
            drawParallax('#7c2d12', 0.4, 80, 0.004, 20);    

            ctx.translate(-camX, 0); 

            for (let plat of platforms) {
                let px = plat.x, py = plat.y;
                
                if (plat.type === 'crumbling') {
                    ctx.fillStyle = plat.touched ? '#c2410c' : '#fb923c'; 
                    if (plat.touched && !plat.isFalling) {
                        px += (Math.random() - 0.5) * 6;
                        py += (Math.random() - 0.5) * 6;
                    }
                } else {
                    ctx.fillStyle = plat.touched ? '#c2410c' : '#ea580c';
                }

                ctx.fillRect(px, py, plat.w, plat.h);
                ctx.fillStyle = '#fdba74'; ctx.fillRect(px, py, plat.w, 4);

                if (plat.type === 'crumbling') {
                    ctx.strokeStyle = '#0f172a'; ctx.lineWidth = 2; ctx.beginPath();
                    ctx.moveTo(px + plat.w/2, py); ctx.lineTo(px + plat.w/2 - 5, py + plat.h/2); ctx.lineTo(px + plat.w/2 + 5, py + plat.h); ctx.stroke();
                }
            }

            for (let h of hazards) {
                if (h.type === 'spike') {
                    ctx.fillStyle = '#ef4444'; ctx.beginPath();
                    ctx.moveTo(h.p.x + h.xOff, h.p.y - 20); ctx.lineTo(h.p.x + h.xOff - 10, h.p.y); ctx.lineTo(h.p.x + h.xOff + 10, h.p.y); ctx.fill();
                } else if (h.type === 'saw') {
                    ctx.save(); ctx.translate(h.x, h.y); ctx.rotate(frame * 0.2); 
                    ctx.fillStyle = '#ea580c'; ctx.beginPath();
                    for(let j=0; j<8; j++) { 
                        ctx.lineTo(Math.cos(j*Math.PI/4)*h.r, Math.sin(j*Math.PI/4)*h.r);
                        ctx.lineTo(Math.cos(j*Math.PI/4 + 0.2)*(h.r+10), Math.sin(j*Math.PI/4 + 0.2)*(h.r+10));
                    }
                    ctx.closePath(); ctx.fill();
                    ctx.fillStyle = '#0f172a'; ctx.beginPath(); ctx.arc(0,0, h.r*0.4, 0, Math.PI*2); ctx.fill();
                    ctx.restore();
                }
            }

            for (let l of lasers) {
                if (l.state === 'warn') {
                    ctx.fillStyle = 'rgba(234, 88, 12, 0.4)'; ctx.fillRect(l.x - 40, 0, 80, canvas.height);
                } else if (l.state === 'fire') {
                    ctx.fillStyle = '#ea580c'; ctx.fillRect(l.x - 40, 0, 80, canvas.height);
                    ctx.fillStyle = '#ffffff'; ctx.fillRect(l.x - 20, 0, 40, canvas.height);
                }
            }

            for (let pt of particles) {
                ctx.fillStyle = pt.color; ctx.globalAlpha = Math.max(0, pt.life / pt.maxLife);
                ctx.beginPath(); ctx.arc(pt.x, pt.y, pt.r, 0, Math.PI*2); ctx.fill(); ctx.globalAlpha = 1;
            }

            drawFace(p.x, p.y, p.r, '#f97316', false);
            ctx.restore(); 
        }

        function gameLoop() { 
            if (isPlaying) { update(); draw(); requestAnimationFrame(gameLoop); } 
        }
    </script>
</body>
</html>
