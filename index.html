<!DOCTYPE html>
<html>
<head>
    <title>Orange City Racer: 3D</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87ceeb; }
        #ui { 
            position: absolute; top: 20px; left: 20px; 
            color: #ff4400; font-family: 'Arial', sans-serif; 
            font-size: 28px; font-weight: bold; text-shadow: 2px 2px #fff;
            pointer-events: none; 
        }
    </style>
</head>
<body>
    <div id="ui">SPEED: <span id="spd">0</span></div>
    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>
    <script type="module">
        import * as THREE from 'three';

        // --- SCENE & CAMERA ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb); // Sky Blue
        scene.fog = new THREE.Fog(0x87ceeb, 20, 100);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // --- LIGHTING (Daytime) ---
        const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 1.2);
        scene.add(hemiLight);
        const sun = new THREE.DirectionalLight(0xffffff, 1.5);
        sun.position.set(50, 100, 50);
        sun.castShadow = true;
        scene.add(sun);

        // --- 20-PART HIGH-DETAIL CAR ---
        const car = new THREE.Group();
        const orangeMat = new THREE.MeshStandardMaterial({ color: 0xffaa00, emissive: 0xff4400, emissiveIntensity: 0.5 });
        const blackMat = new THREE.MeshStandardMaterial({ color: 0x111111 });
        const silverMat = new THREE.MeshStandardMaterial({ color: 0xcccccc, metalness: 1 });

        // 1. Main Body
        const base = new THREE.Mesh(new THREE.BoxGeometry(1.4, 0.3, 2.6), orangeMat);
        base.position.y = 0.4; car.add(base);
        // 2. Cabin
        const cabin = new THREE.Mesh(new THREE.BoxGeometry(1.0, 0.4, 1.2), blackMat);
        cabin.position.set(0, 0.75, 0.1); car.add(cabin);
        // 3-6. Wheels (4 parts)
        const wheelGeo = new THREE.CylinderGeometry(0.35, 0.35, 0.3, 16);
        const wheels = [];
        const wPos = [[0.7, 0.3, 0.9], [-0.7, 0.3, 0.9], [0.7, 0.3, -0.9], [-0.7, 0.3, -0.9]];
        wPos.forEach(p => {
            const w = new THREE.Mesh(wheelGeo, blackMat);
            w.rotation.z = Math.PI/2; w.position.set(...p);
            car.add(w); wheels.push(w);
        });
        // 7-10. Hubcaps (4 parts)
        wPos.forEach(p => {
            const h = new THREE.Mesh(new THREE.CircleGeometry(0.2, 8), silverMat);
            h.position.set(p[0] * 1.16, p[1], p[2]);
            h.rotation.y = p[0] > 0 ? Math.PI/2 : -Math.PI/2;
            car.add(h);
        });
        // 11-12. Headlights (2 parts)
        const headL = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.15, 0.1), new THREE.MeshBasicMaterial({color:0xffffff}));
        headL.position.set(0.4, 0.45, -1.3); car.add(headL);
        const headR = headL.clone(); headR.position.x = -0.4; car.add(headR);
        // 13-14. Tail lights (2 parts)
        const tailL = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.1, 0.1), new THREE.MeshBasicMaterial({color:0xff0000}));
        tailL.position.set(0.4, 0.45, 1.3); car.add(tailL);
        const tailR = tailL.clone(); tailR.position.x = -0.4; car.add(tailR);
        // 15-18. Spoiler struts + blade (3 parts)
        const s1 = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.3, 0.1), orangeMat);
        s1.position.set(0.4, 0.7, 1.1); car.add(s1);
        const s2 = s1.clone(); s2.position.x = -0.4; car.add(s2);
        const s3 = new THREE.Mesh(new THREE.BoxGeometry(1.4, 0.05, 0.4), orangeMat);
        s3.position.set(0, 0.85, 1.1); car.add(s3);
        // 19-20. Exhaust pipes (2 parts)
        const ex = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.08, 0.3), silverMat);
        ex.rotation.x = Math.PI/2; ex.position.set(0.3, 0.3, 1.3); car.add(ex);
        const ex2 = ex.clone(); ex2.position.x = -0.3; car.add(ex2);

        scene.add(car);

        // --- CITY GENERATION ---
        const buildings = [];
        const citySize = 100;
        const roadWidth = 12;

        // Ground
        const ground = new THREE.Mesh(new THREE.PlaneGeometry(1000, 1000), new THREE.MeshStandardMaterial({color: 0x333333}));
        ground.rotation.x = -Math.PI/2; receiveShadow = true;
        scene.add(ground);

        function createBuilding(x, z, w, h, d) {
            const bGeo = new THREE.BoxGeometry(w, h, d);
            const bMat = new THREE.MeshStandardMaterial({color: 0x888888});
            const b = new THREE.Mesh(bGeo, bMat);
            b.position.set(x, h/2, z);
            scene.add(b);
            // Collision box
            buildings.push(new THREE.Box3().setFromObject(b));
        }

        // Simple City Grid with 90-degree turns
        for(let i = -5; i < 5; i++) {
            for(let j = -5; j < 5; j++) {
                if(Math.abs(i) > 0 || Math.abs(j) > 0) {
                    createBuilding(i*25, j*25, 15, 10 + Math.random()*20, 15);
                }
            }
        }

        // --- CONTROLS & PHYSICS ---
        const keys = { w:0, a:0, s:0, d:0 };
        window.onkeydown = (e) => { if(keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = 1; };
        window.onkeyup = (e) => { if(keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = 0; };

        let speed = 0, rotation = 0;
        const maxSpeed = 0.8, accel = 0.03, friction = 0.97;

        function update() {
            if (keys.w) speed += accel;
            if (keys.s) speed -= accel;
            speed *= friction;

            if (Math.abs(speed) > 0.01) {
                if (keys.a) rotation += 0.05;
                if (keys.d) rotation -= 0.05;
            }

            // Move car tentatively
            const nextX = car.position.x + Math.sin(rotation) * speed;
            const nextZ = car.position.z + Math.cos(rotation) * speed;
            
            // Basic Collision Check
            const playerBox = new THREE.Box3().setFromObject(car);
            playerBox.translate(new THREE.Vector3(Math.sin(rotation)*speed, 0, Math.cos(rotation)*speed));
            
            let collision = false;
            for(let b of buildings) {
                if(playerBox.intersectsBox(b)) { collision = true; break; }
            }

            if(!collision) {
                car.position.x = nextX;
                car.position.z = nextZ;
            } else {
                speed = -speed * 0.5; // Bounce back
            }

            car.rotation.y = rotation;

            // CLOSER CAMERA
            const camOffset = new THREE.Vector3(Math.sin(rotation)*-4, 1.8, Math.cos(rotation)*-4);
            camera.position.lerp(car.position.clone().add(camOffset), 0.15);
            camera.lookAt(car.position.x, car.position.y + 0.5, car.position.z);

            document.getElementById('spd').innerText = Math.abs(speed * 200).toFixed(0);
        }

        function animate() {
            requestAnimationFrame(animate);
            update();
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
